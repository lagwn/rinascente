  <text x="730" y="430" text-anchor="middle" fill="rgba(212,175,55,.6)" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:11px">個人事業ではなく、公的支援の専門家です</text>

