  <text x="1136" y="366" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:10px">SNS</text>
  <text x="1182" y="366" fill="#ccc" style="font-size:12px">→</text>
