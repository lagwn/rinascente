  <text x="1170" y="430" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:11px">制作会社のように窓口がバラバラになりません</text>

