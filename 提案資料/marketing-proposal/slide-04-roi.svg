<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Yu Gothic','Hiragino Sans',sans-serif">
<rect width="1920" height="1080" fill="#f7fafc"/>
<rect width="1920" height="6" fill="#0068B7"/>
<text x="160" y="90" fill="#0068B7" font-size="16" font-weight="600" letter-spacing=".15em">ROI ANALYSIS</text>
<text x="160" y="140" fill="#1a202c" font-size="42" font-weight="700">YUMEHO 導入の総合効果 — 年間293万円</text>
<rect x="160" y="165" width="60" height="3" rx="1.5" fill="#0068B7"/>

<!-- Before / After comparison -->
<text x="540" y="230" fill="#e53e3e" font-size="20" font-weight="700" text-anchor="middle">BEFORE（YUMEHO なし）</text>
<rect x="160" y="250" width="760" height="360" rx="16" fill="#fff" stroke="#e53e3e" stroke-width="2"/>

<text x="200" y="300" fill="#1a202c" font-size="18" font-weight="600">歩行リハビリ体制</text>
<rect x="200" y="315" width="680" height="45" rx="8" fill="#FFF5F5"/>
<text x="220" y="344" fill="#1a202c" font-size="16">介助スタッフ <tspan font-weight="700" fill="#e53e3e">2〜3名</tspan> が常時必要</text>

<text x="200" y="400" fill="#1a202c" font-size="18" font-weight="600">年間コスト</text>
<text x="220" y="435" fill="#718096" font-size="15">人件費（3名 x 時給1,323円 x 8h x 240日）</text>
<text x="840" y="435" fill="#1a202c" font-size="15" font-weight="600" text-anchor="end">約762万円</text>
<line x1="220" y1="450" x2="840" y2="450" stroke="#e2e8f0"/>
<text x="220" y="475" fill="#718096" font-size="15">採用関連コスト（広告費+採用費）</text>
<text x="840" y="475" fill="#1a202c" font-size="15" font-weight="600" text-anchor="end">約78万円</text>
<line x1="220" y1="490" x2="840" y2="490" stroke="#e2e8f0"/>
<text x="220" y="520" fill="#1a202c" font-size="18" font-weight="700">合計</text>
<text x="840" y="520" fill="#e53e3e" font-size="22" font-weight="700" text-anchor="end">約840万円 / 年</text>
<text x="220" y="555" fill="#718096" font-size="13">離職率15% → 補充採用の繰り返し</text>
<text x="220" y="580" fill="#718096" font-size="13">身体的負担 → さらなる離職リスク</text>

<!-- Arrow -->
<text x="960" y="430" fill="#0068B7" font-size="48" font-weight="700" text-anchor="middle">→</text>

<!-- After -->
<text x="1380" y="230" fill="#276749" font-size="20" font-weight="700" text-anchor="middle">AFTER（YUMEHO あり）</text>
<rect x="1000" y="250" width="760" height="360" rx="16" fill="#fff" stroke="#276749" stroke-width="2"/>

<text x="1040" y="300" fill="#1a202c" font-size="18" font-weight="600">歩行リハビリ体制</text>
<rect x="1040" y="315" width="680" height="45" rx="8" fill="#F0FFF4"/>
<text x="1060" y="344" fill="#1a202c" font-size="16">見守りスタッフ <tspan font-weight="700" fill="#276749">1名</tspan> で安全に運用</text>

<text x="1040" y="400" fill="#1a202c" font-size="18" font-weight="600">年間コスト削減</text>
<text x="1060" y="435" fill="#718096" font-size="15">人件費削減（2名分 x 1,323円 x 8h x 240日）</text>
<text x="1680" y="435" fill="#276749" font-size="15" font-weight="700" text-anchor="end">-254万円</text>
<line x1="1060" y1="450" x2="1680" y2="450" stroke="#e2e8f0"/>
<text x="1060" y="475" fill="#718096" font-size="15">採用コスト削減（50%減）</text>
<text x="1680" y="475" fill="#276749" font-size="15" font-weight="700" text-anchor="end">-39万円</text>
<line x1="1060" y1="490" x2="1680" y2="490" stroke="#e2e8f0"/>
<text x="1060" y="525" fill="#1a202c" font-size="18" font-weight="700">年間総合効果</text>
<text x="1680" y="525" fill="#276749" font-size="26" font-weight="700" text-anchor="end">約293万円 / 年</text>
<text x="1060" y="560" fill="#718096" font-size="13">身体負担軽減 → 離職率低下</text>
<text x="1060" y="585" fill="#718096" font-size="13">先端設備 → 求人の訴求力向上</text>

<!-- 3 benefit cards at bottom -->
<rect x="160" y="660" width="500" height="180" rx="12" fill="#0068B7"/>
<rect x="200" y="700" width="50" height="50" rx="10" fill="#fff" fill-opacity=".15"/>
<text x="225" y="733" fill="#fff" font-size="24" text-anchor="middle">&#165;</text>
<text x="270" y="720" fill="#fff" font-size="20" font-weight="700">人件費削減</text>
<text x="270" y="755" fill="#fff" font-size="40" font-weight="700">254万円<tspan font-size="18" opacity=".7"> / 年</tspan></text>
<text x="270" y="790" fill="#fff" font-size="14" opacity=".7">見守り1名で運用可能</text>
<text x="270" y="815" fill="#fff" font-size="14" opacity=".7">従来の2-3名 → 1名に</text>

<rect x="710" y="660" width="500" height="180" rx="12" fill="#2b6cb0"/>
<rect x="750" y="700" width="50" height="50" rx="10" fill="#fff" fill-opacity=".15"/>
<text x="775" y="733" fill="#fff" font-size="22" text-anchor="middle">&#128101;</text>
<text x="820" y="720" fill="#fff" font-size="20" font-weight="700">採用コスト削減</text>
<text x="820" y="755" fill="#fff" font-size="40" font-weight="700">39万円<tspan font-size="18" opacity=".7"> / 年</tspan></text>
<text x="820" y="790" fill="#fff" font-size="14" opacity=".7">離職率低下 + 求人効率向上</text>
<text x="820" y="815" fill="#fff" font-size="14" opacity=".7">採用プレッシャーから解放</text>

<rect x="1260" y="660" width="500" height="180" rx="12" fill="#2c5282"/>
<rect x="1300" y="700" width="50" height="50" rx="10" fill="#fff" fill-opacity=".15"/>
<text x="1325" y="733" fill="#fff" font-size="22" text-anchor="middle">+</text>
<text x="1370" y="720" fill="#fff" font-size="20" font-weight="700">訓練機会増加</text>
<text x="1370" y="755" fill="#fff" font-size="40" font-weight="700">1.5倍</text>
<text x="1370" y="790" fill="#fff" font-size="14" opacity=".7">同スタッフ数で1.5倍の訓練提供</text>
<text x="1370" y="815" fill="#fff" font-size="14" opacity=".7">利用者満足度 + 施設評価向上</text>

<!-- Highlight -->
<rect x="160" y="880" width="1600" height="90" rx="12" fill="#FFF2CC" stroke="#D69E2E"/>
<text x="960" y="925" fill="#744210" font-size="22" font-weight="700" text-anchor="middle">稟議資料のポイント: 「人件費254万円 + 採用コスト39万円 = 年間293万円」の総合効果で投資回収を訴求</text>
<text x="960" y="955" fill="#744210" font-size="15" text-anchor="middle">転倒事故リスク低減・訓練機会増加は定性効果としてさらに上乗せ</text>

<text x="1760" y="1050" fill="#a0aec0" font-size="14" text-anchor="end">04</text>
</svg>
