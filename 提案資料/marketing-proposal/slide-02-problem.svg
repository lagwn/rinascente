<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="'Yu Gothic','Hiragino Sans',sans-serif">
<rect width="1920" height="1080" fill="#f7fafc"/>
<!-- Header bar -->
<rect width="1920" height="6" fill="#0068B7"/>
<text x="160" y="90" fill="#0068B7" font-size="16" font-weight="600" letter-spacing=".15em">MARKET BACKGROUND</text>
<text x="160" y="140" fill="#1a202c" font-size="42" font-weight="700">介護業界の採用難 — 数字で見る現実</text>
<rect x="160" y="165" width="60" height="3" rx="1.5" fill="#0068B7"/>

<!-- 4 stat cards -->
<!-- Card 1 -->
<rect x="160" y="220" width="360" height="280" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
<rect x="160" y="220" width="360" height="6" rx="3" fill="#e53e3e"/>
<text x="340" y="310" fill="#e53e3e" font-size="72" font-weight="700" text-anchor="middle">3.5倍</text>
<text x="340" y="360" fill="#1a202c" font-size="20" font-weight="600" text-anchor="middle">有効求人倍率</text>
<text x="340" y="400" fill="#718096" font-size="16" text-anchor="middle">全業種平均1.2倍の約3倍</text>
<text x="340" y="430" fill="#718096" font-size="16" text-anchor="middle">慢性的な人手不足状態</text>
<rect x="200" y="455" width="280" height="30" rx="6" fill="#FFF5F5"/>
<text x="340" y="476" fill="#e53e3e" font-size="13" font-weight="600" text-anchor="middle">求人を出しても人が集まらない</text>

<!-- Card 2 -->
<rect x="560" y="220" width="360" height="280" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
<rect x="560" y="220" width="360" height="6" rx="3" fill="#DD6B20"/>
<text x="740" y="310" fill="#DD6B20" font-size="72" font-weight="700" text-anchor="middle">15%</text>
<text x="740" y="360" fill="#1a202c" font-size="20" font-weight="600" text-anchor="middle">年間離職率</text>
<text x="740" y="400" fill="#718096" font-size="16" text-anchor="middle">身体的負担が離職の主因</text>
<text x="740" y="430" fill="#718096" font-size="16" text-anchor="middle">腰痛・転倒介助の負荷</text>
<rect x="600" y="455" width="280" height="30" rx="6" fill="#FFFAF0"/>
<text x="740" y="476" fill="#DD6B20" font-size="13" font-weight="600" text-anchor="middle">採用してもすぐ辞めてしまう</text>

<!-- Card 3 -->
<rect x="960" y="220" width="360" height="280" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
<rect x="960" y="220" width="360" height="6" rx="3" fill="#D69E2E"/>
<text x="1140" y="310" fill="#D69E2E" font-size="62" font-weight="700" text-anchor="middle">30-50万円</text>
<text x="1140" y="360" fill="#1a202c" font-size="20" font-weight="600" text-anchor="middle">1人あたり採用コスト</text>
<text x="1140" y="400" fill="#718096" font-size="16" text-anchor="middle">求人広告費 + 紹介手数料</text>
<text x="1140" y="430" fill="#718096" font-size="16" text-anchor="middle">年間数百万円の固定支出</text>
<rect x="1000" y="455" width="280" height="30" rx="6" fill="#FFFFF0"/>
<text x="1140" y="476" fill="#D69E2E" font-size="13" font-weight="600" text-anchor="middle">採用コストが経営を圧迫</text>

<!-- Card 4 -->
<rect x="1360" y="220" width="360" height="280" rx="16" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
<rect x="1360" y="220" width="360" height="6" rx="3" fill="#0068B7"/>
<text x="1540" y="310" fill="#0068B7" font-size="72" font-weight="700" text-anchor="middle">常時</text>
<text x="1540" y="360" fill="#1a202c" font-size="20" font-weight="600" text-anchor="middle">求人掲載</text>
<text x="1540" y="400" fill="#718096" font-size="16" text-anchor="middle">大半の施設が常時求人を掲出</text>
<text x="1540" y="430" fill="#718096" font-size="16" text-anchor="middle">= 人手不足が可視化されている</text>
<rect x="1400" y="455" width="280" height="30" rx="6" fill="#EBF8FF"/>
<text x="1540" y="476" fill="#0068B7" font-size="13" font-weight="600" text-anchor="middle">ターゲットが明確に見える</text>

<!-- Insight box -->
<rect x="160" y="560" width="1600" height="140" rx="16" fill="#0068B7"/>
<text x="960" y="620" fill="#fff" font-size="28" font-weight="700" text-anchor="middle">発想の転換</text>
<text x="960" y="665" fill="#fff" font-size="22" text-anchor="middle" opacity=".9">「求人を出している施設」＝「YUMEHO を最も必要としている施設」</text>

<!-- Bottom comparison -->
<rect x="160" y="760" width="760" height="200" rx="12" fill="#fff" stroke="#e2e8f0"/>
<rect x="160" y="760" width="760" height="50" rx="12" fill="#FFF5F5"/>
<rect x="160" y="790" width="760" height="1" fill="#FFF5F5"/>
<text x="540" y="795" fill="#e53e3e" font-size="18" font-weight="700" text-anchor="middle">従来の発想</text>
<text x="540" y="850" fill="#1a202c" font-size="22" text-anchor="middle">求職者（介護士・PT）に広告を出す</text>
<text x="540" y="890" fill="#718096" font-size="16" text-anchor="middle">購買決定者ではない → CV が遠い → 効率が悪い</text>
<text x="540" y="930" fill="#e53e3e" font-size="16" font-weight="600" text-anchor="middle">広告費が分散するだけ</text>

<text x="960" y="870" fill="#0068B7" font-size="36" font-weight="700" text-anchor="middle">→</text>

<rect x="1000" y="760" width="760" height="200" rx="12" fill="#fff" stroke="#0068B7" stroke-width="2"/>
<rect x="1000" y="760" width="760" height="50" rx="12" fill="#EBF8FF"/>
<rect x="1000" y="790" width="760" height="1" fill="#EBF8FF"/>
<text x="1380" y="795" fill="#0068B7" font-size="18" font-weight="700" text-anchor="middle">新しい発想</text>
<text x="1380" y="850" fill="#1a202c" font-size="22" text-anchor="middle">求人を「出している施設」にアプローチ</text>
<text x="1380" y="890" fill="#718096" font-size="16" text-anchor="middle">人手不足の当事者 → 投資意欲あり → 購買決定者</text>
<text x="1380" y="930" fill="#0068B7" font-size="16" font-weight="600" text-anchor="middle">コスト0円で見込み客リストが作れる</text>

<!-- Page number -->
<text x="1760" y="1050" fill="#a0aec0" font-size="14" text-anchor="end">02</text>
</svg>
