<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 1440 810" width="1440" height="810">
  <defs>
    <style>
      text{font-family:HiraKakuProN-W3-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN',sans-serif}
    </style>
  </defs>

  <!-- Background -->
  <rect width="1440" height="810" fill="#fff"/>
  <rect width="1440" height="4" fill="#0068b7"/>

  <!-- Header -->
