  <text x="110" y="548" fill="#333" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:13px">制作会社に頼むと…</text>
  <text x="110" y="572" fill="#aaa" style="font-size:11px">制作は A社、運用は B社、広告は C社 → 窓口がバラバラ</text>
  <text x="110" y="606" fill="#333" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:13px">私の場合 →</text>
  <text x="200" y="606" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:13px">窓口がひとつで、すべてつながります</text>

  <!-- Arrow -->
  <rect x="110" y="628" width="380" height="52" rx="8" ry="8" fill="#f0f7ff"/>
  <text x="300" y="652" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:12px">制作 → SNS運用 → 広告 → 分析・改善</text>
  <text x="300" y="670" text-anchor="middle" fill="#888" style="font-size:10px">ひとりの担当者が一気通貫で対応</text>


