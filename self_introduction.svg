  <rect x="110" y="466" width="120" height="30" rx="6" ry="6" fill="#f0f7ff" stroke="#b0d4ee" stroke-width=".5"/>
  <text x="170" y="486" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:11px">広告運用</text>
  <rect x="240" y="466" width="120" height="30" rx="6" ry="6" fill="#f0f7ff" stroke="#b0d4ee" stroke-width=".5"/>
  <text x="300" y="486" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:11px">アクセス解析</text>
  <rect x="370" y="466" width="120" height="30" rx="6" ry="6" fill="#f0f7ff" stroke="#b0d4ee" stroke-width=".5"/>
  <text x="430" y="486" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:11px">コンサル</text>

