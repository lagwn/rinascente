  <rect x="110" y="310" width="390" height="64" rx="10" ry="10" fill="#0068b7"/>
  <text x="305" y="340" text-anchor="middle" fill="#fff" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:15px">作って終わりではなく</text>
  <text x="305" y="364" text-anchor="middle" fill="rgba(255,255,255,.7)" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:15px">公開後の運用・成果まで一貫して対応</text>

  <!-- Support areas -->
  <text x="110" y="412" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:12px">対応領域</text>
  <rect x="110" y="426" width="120" height="30" rx="6" ry="6" fill="#f0f7ff" stroke="#b0d4ee" stroke-width=".5"/>
  <text x="170" y="446" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:11px">Web制作</text>
  <rect x="240" y="426" width="120" height="30" rx="6" ry="6" fill="#f0f7ff" stroke="#b0d4ee" stroke-width=".5"/>
  <text x="300" y="446" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:11px">デザイン</text>
  <rect x="370" y="426" width="120" height="30" rx="6" ry="6" fill="#f0f7ff" stroke="#b0d4ee" stroke-width=".5"/>
