  <!-- Card 1: Yorozu -->
  <rect x="560" y="160" width="800" height="200" rx="16" ry="16" fill="#1a1510"/>
  <rect x="590" y="188" width="56" height="56" rx="28" ry="28" fill="rgba(212,175,55,.2)"/>
  <text x="618" y="222" text-anchor="middle" fill="#d4af37" style="font-family:HelveticaNeue-Bold,'Helvetica Neue';font-weight:700;font-size:20px">6</text>
  <text x="618" y="238" text-anchor="middle" fill="rgba(212,175,55,.5)" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:8px">年間</text>

  <text x="670" y="208" fill="rgba(255,255,255,.35)" style="font-family:HelveticaNeue-Bold,'Helvetica Neue';font-weight:700;font-size:10px;letter-spacing:.1em">PUBLIC SUPPORT</text>
  <text x="670" y="238" fill="#d4af37" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:20px">鳥取県よろず支援拠点</text>
  <text x="670" y="264" fill="rgba(255,255,255,.7)" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:14px">デザイン・IT・広告の専門コーディネーター</text>

  <line x1="590" y1="286" x2="1320" y2="286" stroke="rgba(255,255,255,.08)" stroke-width="1"/>

  <text x="590" y="316" fill="rgba(255,255,255,.5)" style="font-size:12px">中小企業庁が全国に設置する経営相談所。デザイン・IT・広告の専門家として</text>
  <text x="590" y="336" fill="rgba(255,255,255,.5)" style="font-size:12px">6年間で多数の事業者様の Web 戦略・サイト構築・SNS運用・広告設計を支援。</text>

  <!-- Card 2: Shinyo Hosho -->
  <rect x="560" y="380" width="800" height="200" rx="16" ry="16" fill="#1a1510"/>
  <rect x="590" y="408" width="56" height="56" rx="28" ry="28" fill="rgba(212,175,55,.2)"/>
  <text x="618" y="436" text-anchor="middle" fill="#d4af37" style="font-family:HelveticaNeue-Bold,'Helvetica Neue';font-weight:700;font-size:14px">MA</text>
  <text x="618" y="456" text-anchor="middle" fill="rgba(212,175,55,.4)" style="font-size:7px">ADVISOR</text>

  <text x="670" y="428" fill="rgba(255,255,255,.35)" style="font-family:HelveticaNeue-Bold,'Helvetica Neue';font-weight:700;font-size:10px;letter-spacing:.1em">PUBLIC SUPPORT</text>
  <text x="670" y="458" fill="#d4af37" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:20px">鳥取県信用保証協会</text>
  <text x="670" y="484" fill="rgba(255,255,255,.7)" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:14px">メソッドアドバイザー</text>

  <line x1="590" y1="506" x2="1320" y2="506" stroke="rgba(255,255,255,.08)" stroke-width="1"/>

  <text x="590" y="536" fill="rgba(255,255,255,.5)" style="font-size:12px">信用保証協会の融資先事業者に対し、Web・デジタル分野の専門アドバイザーとして</text>
  <text x="590" y="556" fill="rgba(255,255,255,.5)" style="font-size:12px">サイト改善・集客戦略・SNS活用などの実務支援を実施。多数の案件を経験。</text>

  <!-- Bottom highlight -->
  <rect x="560" y="604" width="800" height="96" rx="16" ry="16" fill="#f0f7ff" stroke="#0068b7" stroke-width="1"/>
  <text x="960" y="640" text-anchor="middle" fill="#0068b7" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:16px">公的支援機関のコンサルタントが、サイト制作からお手伝いします</text>
  <text x="960" y="670" text-anchor="middle" fill="#888" style="font-size:12px">単なる制作者ではなく、事業の成長を見据えた「仕組みづくり」のパートナーです</text>

  <!-- Footer -->
  <rect x="0" y="768" width="1440" height="42" fill="#0068b7"/>
  <text x="720" y="794" text-anchor="middle" fill="rgba(255,255,255,.4)" style="font-size:10px">Confidential — Prepared for 医療法人真誠会</text>
