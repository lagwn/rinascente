  <text x="720" y="110" text-anchor="middle" fill="#1a1a1a" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:34px;letter-spacing:.08em">自己紹介</text>

  <!-- ===== Left Column: Profile ===== -->
  <!-- Photo placeholder -->
  <rect x="80" y="160" width="440" height="540" rx="20" ry="20" fill="#f6f8fb" stroke="#e0e0e0" stroke-width=".75"/>

  <!-- Name area -->
  <circle cx="180" cy="240" r="48" fill="#0068b7"/>
  <text x="180" y="236" text-anchor="middle" fill="rgba(255,255,255,.3)" style="font-family:HelveticaNeue-Bold,'Helvetica Neue';font-weight:700;font-size:10px;letter-spacing:.1em">PHOTO</text>
  <text x="180" y="256" text-anchor="middle" fill="rgba(255,255,255,.3)" style="font-size:9px">写真を配置</text>

  <text x="250" y="228" fill="#1a1a1a" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:24px">屋号 / 氏名</text>
  <text x="250" y="256" fill="#888" style="font-size:12px">Web制作 / デザイン / マーケティング</text>

  <!-- Divider -->
  <line x1="110" y1="290" x2="490" y2="290" stroke="#e0e0e0" stroke-width="1"/>

