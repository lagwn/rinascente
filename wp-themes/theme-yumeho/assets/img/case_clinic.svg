<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Blob -->
  <path d="M550 200C550 300 450 380 300 380C150 380 50 300 50 200C50 100 150 20 300 20C450 20 550 100 550 200Z" fill="#fff9c4"/>

  <!-- Stand Pillars -->
  <rect x="150" y="50" width="20" height="300" rx="5" fill="#4ecdc4" stroke="black" stroke-width="6"/> <!-- Left Pillar -->
  <rect x="430" y="50" width="20" height="300" rx="5" fill="#4ecdc4" stroke="black" stroke-width="6"/> <!-- Right Pillar -->
  
  <!-- Overhead Rail -->
  <rect x="140" y="60" width="320" height="20" rx="5" fill="#9d8df1" stroke="black" stroke-width="6"/>
  
  <!-- Patient Character -->
  <g transform="translate(260, 150)">
    <!-- Body -->
    <rect x="20" y="30" width="50" height="80" rx="20" fill="#ff6b6b" stroke="black" stroke-width="6"/>
    <!-- Head -->
    <circle cx="45" cy="15" r="20" fill="#ffeb3b" stroke="black" stroke-width="6"/>
    <!-- Face -->
    <circle cx="55" cy="15" r="3" fill="black"/>
    
    <!-- Legs -->
    <path d="M30 110L30 160" stroke="black" stroke-width="6" stroke-linecap="round"/>
    <path d="M60 110L70 150" stroke="black" stroke-width="6" stroke-linecap="round"/>
    
    <!-- Arms -->
    <path d="M20 60L-10 80" stroke="black" stroke-width="6" stroke-linecap="round"/> <!-- Resting on hypothetical rail -->
    <path d="M70 60L100 80" stroke="black" stroke-width="6" stroke-linecap="round"/>
  </g>
  
  <!-- Harness Line -->
  <line x1="300" y1="80" x2="300" y2="150" stroke="black" stroke-width="4"/>

  <!-- Decor -->
  <article cx="500" cy="80" r="10" fill="#c7f464" stroke="black" stroke-width="3"/>
</svg>
