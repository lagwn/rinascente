  <rect x="80" y="2780" width="1280" height="120" rx="16" ry="16" fill="#0068b7"/>
  <text x="720" y="2820" text-anchor="middle" fill="rgba(255,255,255,.4)" style="font-family:HelveticaNeue-Bold,'Helvetica Neue';font-weight:700;font-size:10px;letter-spacing:.15em">KEY MESSAGE</text>
  <text x="720" y="2856" text-anchor="middle" fill="#fff" style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:18px">どの質問にも「根拠」と「代替案」を持って回答できる体制を整えています</text>
  <text x="720" y="2882" text-anchor="middle" fill="rgba(255,255,255,.5)" style="font-size:12px">不安を解消するのは「大丈夫です」という言葉ではなく、具体的な仕組みと実績です</text>

