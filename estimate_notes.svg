  <text class="st7" transform="translate(248 884)"><tspan x="0" y="0">他社と同じ見た目になりやすい</tspan></text>
  <text class="st7" transform="translate(248 894)"><tspan x="0" y="0">（テンプレート利用者同士で類似）</tspan></text>
  <text style="font-family:HiraKakuProN-W3-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:7.5px;fill:#0068b7;font-weight:700;" transform="translate(404 888)"><tspan x="0" y="0">完全オリジナルで唯一無二のブランド表現</tspan></text>

  <!-- Row 2 -->
