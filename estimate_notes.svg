  <line class="st10" x1="40" y1="926" x2="556" y2="926"/>
  <text class="st5" transform="translate(48 916)"><tspan x="0" y="0">3サイト統合設計</tspan></text>
  <text class="st7" transform="translate(248 912)"><tspan x="0" y="0">サイトごとに個別テーマを購入</tspan></text>
  <text class="st7" transform="translate(248 922)"><tspan x="0" y="0">（統一感・回遊導線の設計が困難）</tspan></text>
  <text style="font-family:HiraKakuProN-W3-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:7.5px;fill:#0068b7;font-weight:700;" transform="translate(404 916)"><tspan x="0" y="0">3サイト横断の共通設計・会員基盤</tspan></text>

