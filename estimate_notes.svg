  <line class="st10" x1="40" y1="954" x2="556" y2="954"/>
  <text class="st5" transform="translate(48 944)"><tspan x="0" y="0">カスタマイズ性</tspan></text>
  <text class="st7" transform="translate(248 940)"><tspan x="0" y="0">テーマの設定範囲内に限定</tspan></text>
  <text class="st7" transform="translate(248 950)"><tspan x="0" y="0">（想定外の機能追加は困難・高コスト化）</tspan></text>
  <text style="font-family:HiraKakuProN-W3-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:7.5px;fill:#0068b7;font-weight:700;" transform="translate(404 944)"><tspan x="0" y="0">事業成長に合わせた柔軟な拡張が可能</tspan></text>

  <!-- Row 4 -->
