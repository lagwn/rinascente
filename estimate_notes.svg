  <text style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:7px;fill:#333;" transform="translate(318 864)"><tspan x="0" y="0" text-anchor="middle">テンプレート型</tspan></text>
  <text style="font-family:HiraKakuProN-W6-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:7px;fill:#fff;" transform="translate(476 864)"><tspan x="0" y="0" text-anchor="middle">本提案（オーダーメイド）</tspan></text>

