  <text style="font-family:HiraKakuProN-W3-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:7.5px;fill:#0068b7;font-weight:700;" transform="translate(404 1028)"><tspan x="0" y="0">自社資産として長期運用・改修が容易</tspan></text>

