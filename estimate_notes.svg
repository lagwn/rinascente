  <text class="st7" transform="translate(248 968)"><tspan x="0" y="0">WordPress + プラグイン依存</tspan></text>
  <text class="st7" transform="translate(248 978)"><tspan x="0" y="0">（攻撃対象になりやすく定期更新が必須）</tspan></text>
  <text style="font-family:HiraKakuProN-W3-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:7.5px;fill:#0068b7;font-weight:700;" transform="translate(404 972)"><tspan x="0" y="0">不要なプラグインなし・攻撃面が小さい</tspan></text>

