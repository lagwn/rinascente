  <text class="st7" transform="translate(248 996)"><tspan x="0" y="0">プラグイン増加で速度低下しやすい</tspan></text>
  <text class="st7" transform="translate(248 1006)"><tspan x="0" y="0">（テーマ自体の冗長コードも影響）</tspan></text>
  <text style="font-family:HiraKakuProN-W3-83pv-RKSJ-H,'Hiragino Kaku Gothic ProN';font-size:7.5px;fill:#0068b7;font-weight:700;" transform="translate(404 1000)"><tspan x="0" y="0">必要最小限の軽量設計で高速表示</tspan></text>

