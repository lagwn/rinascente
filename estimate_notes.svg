  <rect class="st8" x="40" y="40" width="515.3" height="2.5"/>
  <text class="st4" transform="translate(40 68)"><tspan x="0" y="0">御見積書 — 別紙</tspan></text>
  <text class="st0" transform="translate(40 82)"><tspan x="0" y="0">EST-2026-0403-01　スケジュール・前提条件・備考</tspan></text>
  <line class="st10" x1="40" y1="90" x2="555.3" y2="90"/>
  <text class="st1" transform="translate(40 114)"><tspan x="0" y="0">1. スケジュール目安</tspan></text>
  <rect class="st12" x="40" y="126" width="160" height="72" rx="6" ry="6"/>
  <rect class="st8" x="40" y="126" width="160" height="20"/>
  <rect class="st8" x="40" y="136" width="160" height="10"/>
  <text class="st2" transform="translate(104.8 140)"><tspan x="0" y="0">WEEK 1</tspan></text>
  <text class="st5" transform="translate(52 160)"><tspan x="0" y="0">要件確定・画面整理</tspan></text>
  <text class="st7" transform="translate(52 172)"><tspan x="0" y="0">ヒアリング、要件整理、全体方針の確定</tspan></text>
  <text class="st7" transform="translate(52 184)"><tspan x="0" y="0">サイトマップ整理、デザイン調整方針の確定</tspan></text>
  <rect class="st12" x="218" y="126" width="160" height="72" rx="6" ry="6"/>
  <rect class="st8" x="218" y="126" width="160" height="20"/>
  <rect class="st8" x="218" y="136" width="160" height="10"/>
  <text class="st2" transform="translate(282.8 140)"><tspan x="0" y="0">WEEK 2</tspan></text>
  <text class="st5" transform="translate(230 160)"><tspan x="0" y="0">制作・実装</tspan></text>
  <text class="st7" transform="translate(230 172)"><tspan x="0" y="0">公開ページ制作（3サイト 32ページ）</tspan></text>
  <text class="st7" transform="translate(230 184)"><tspan x="0" y="0">CMS / 管理画面、共通会員機能の実装</tspan></text>
  <rect class="st12" x="396" y="126" width="160" height="72" rx="6" ry="6"/>
  <rect class="st8" x="396" y="126" width="160" height="20"/>
  <rect class="st8" x="396" y="136" width="160" height="10"/>
  <text class="st2" transform="translate(460.8 140)"><tspan x="0" y="0">WEEK 3</tspan></text>
  <text class="st5" transform="translate(408 160)"><tspan x="0" y="0">テスト・公開</tspan></text>
  <text class="st7" transform="translate(408 172)"><tspan x="0" y="0">結合テスト、表示確認、導線確認</tspan></text>
  <text class="st7" transform="translate(408 184)"><tspan x="0" y="0">修正対応、公開準備、最終調整</tspan></text>
  <polygon class="st8" points="204 162 214 157 214 167 204 162"/>
  <polygon class="st8" points="382 162 392 157 392 167 382 162"/>
  <rect class="st11" x="40" y="208" width="516" height="28" rx="4" ry="4"/>
  <text class="st6" transform="translate(52 226)"><tspan x="0" y="0">本体：約3週間</tspan></text>
  <text class="st7" transform="translate(150 226)"><tspan x="0" y="0">｜</tspan></text>
  <text class="st6" transform="translate(164 226)"><tspan x="0" y="0">オプション同時採用の場合：+1週間程度（計 約4週間）</tspan></text>
  <line class="st10" x1="40" y1="252" x2="555.3" y2="252"/>
  <text class="st1" transform="translate(40 274)"><tspan x="0" y="0">2. 前提条件</tspan></text>
  <circle class="st8" cx="52" cy="290" r="6"/>
  <text class="st3" transform="translate(50.1 293)"><tspan x="0" y="0">1</tspan></text>
  <text class="st5" transform="translate(66 293)"><tspan x="0" y="0">既存プロトタイプの流用</tspan></text>
  <text class="st7" transform="translate(66 305)"><tspan x="0" y="0">既存プロトタイプの HTML、画面構成、既存パーツを最大限流用します。</tspan></text>
  <text class="st7" transform="translate(66 317)"><tspan x="0" y="0">ページごとに完全新規デザインを行わず、共通テンプレートを横展開する前提です。</tspan></text>
  <circle class="st8" cx="52" cy="337" r="6"/>
  <text class="st3" transform="translate(50.1 340)"><tspan x="0" y="0">2</tspan></text>
  <text class="st5" transform="translate(66 340)"><tspan x="0" y="0">デザイン範囲</tspan></text>
  <text class="st7" transform="translate(66 352)"><tspan x="0" y="0">既存プロトタイプのブラッシュアップを前提とし、全面リニューアルは含みません。</tspan></text>
  <text class="st7" transform="translate(66 364)"><tspan x="0" y="0">表示最適化は PC / スマートフォン対応を含みます。</tspan></text>
  <circle class="st8" cx="52" cy="384" r="6"/>
  <text class="st3" transform="translate(50.1 387)"><tspan x="0" y="0">3</tspan></text>
  <text class="st5" transform="translate(66 387)"><tspan x="0" y="0">素材のご支給</tspan></text>
  <text class="st7" transform="translate(66 399)"><tspan x="0" y="0">原稿、写真、製品情報はご支給、または既存素材を活用する前提です。</tspan></text>
  <text class="st7" transform="translate(66 411)"><tspan x="0" y="0">大幅な原稿制作・取材ライティングは含みません。</tspan></text>
  <circle class="st8" cx="52" cy="431" r="6"/>
  <text class="st3" transform="translate(50.1 434)"><tspan x="0" y="0">4</tspan></text>
  <text class="st5" transform="translate(66 434)"><tspan x="0" y="0">CMS / 管理画面</tspan></text>
  <text class="st7" transform="translate(66 446)"><tspan x="0" y="0">簡易管理方式とし、更新範囲を限定します。</tspan></text>
  <text class="st7" transform="translate(66 458)"><tspan x="0" y="0">複数権限ロールを持つ高機能 CMS は含みません。</tspan></text>
  <circle class="st8" cx="52" cy="478" r="6"/>
  <text class="st3" transform="translate(50.1 481)"><tspan x="0" y="0">5</tspan></text>
  <text class="st5" transform="translate(66 481)"><tspan x="0" y="0">会員機能</tspan></text>
  <text class="st7" transform="translate(66 493)"><tspan x="0" y="0">基本機能（動画閲覧、購入履歴閲覧）に絞り、複雑な権限設計は行いません。（コミュニティ機能はオプションで対応可能）</tspan></text>
  <text class="st7" transform="translate(66 505)"><tspan x="0" y="0">会員認証エリアは Rinascentes 管理下に配置します。</tspan></text>
  <text class="st7" transform="translate(66 517)"><tspan x="0" y="0">会員ごとの細かな権限分岐やマイページ拡張は含みません。</tspan></text>
  <circle class="st8" cx="52" cy="537" r="6"/>
  <text class="st3" transform="translate(50.1 540)"><tspan x="0" y="0">6</tspan></text>
  <text class="st5" transform="translate(66 540)"><tspan x="0" y="0">購入履歴</tspan></text>
  <text class="st7" transform="translate(66 552)"><tspan x="0" y="0">管理画面から手動登録・更新する前提です。</tspan></text>
  <text class="st7" transform="translate(66 564)"><tspan x="0" y="0">オンライン決済との自動連携は本体範囲に含みません（オプションで対応可能）。</tspan></text>
  <circle class="st8" cx="52" cy="584" r="6"/>
  <text class="st3" transform="translate(50.1 587)"><tspan x="0" y="0">7</tspan></text>
  <text class="st5" transform="translate(66 587)"><tspan x="0" y="0">確認進行</tspan></text>
  <text class="st7" transform="translate(66 599)"><tspan x="0" y="0">3週間での迅速な確認進行をお願いいたします。</tspan></text>
  <line class="st10" x1="40" y1="630" x2="555.3" y2="630"/>
  <text class="st1" transform="translate(40 652)"><tspan x="0" y="0">3. 本見積りに含まないもの</tspan></text>
  <rect class="st9" x="40" y="662" width="516" height="120" rx="6" ry="6"/>
  <text class="st7" transform="translate(56 680)"><tspan x="0" y="0">・大幅な原稿制作や取材ライティング</tspan></text>
  <text class="st7" transform="translate(56 694)"><tspan x="0" y="0">・写真撮影、動画撮影、図版制作</tspan></text>
  <text class="st7" transform="translate(56 708)"><tspan x="0" y="0">・複数権限ロールを持つ高機能 CMS</tspan></text>
  <text class="st7" transform="translate(56 722)"><tspan x="0" y="0">・会員ごとの細かな権限分岐やマイページ拡張</tspan></text>
  <text class="st7" transform="translate(56 736)"><tspan x="0" y="0">・スレッド形式のコミュニティ機能（オプション OP1 で対応可能）</tspan></text>
  <text class="st7" transform="translate(56 750)"><tspan x="0" y="0">・YUMEHO / MICA30 からのオンライン決済機能（オプション OP2 で対応可能）</tspan></text>
  <text class="st7" transform="translate(56 764)"><tspan x="0" y="0">・決済に伴う購入履歴の自動反映、多言語化、広告運用、SEO 記事制作</tspan></text>
  <line class="st10" x1="40" y1="800" x2="555.3" y2="800"/>

  <text class="st1" transform="translate(40 822)"><tspan x="0" y="0">4. テンプレート型サイトとの違い</tspan></text>

  <text class="st7" transform="translate(40 840)"><tspan x="0" y="0">市販の WordPress テンプレート（TCD 等）を用いた制作との主な違いは以下の通りです。</tspan></text>

